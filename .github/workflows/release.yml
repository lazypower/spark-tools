name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X github.com/lazypower/spark-tools/internal/version.Version=${VERSION} \
            -X github.com/lazypower/spark-tools/internal/version.Commit=${COMMIT} \
            -X github.com/lazypower/spark-tools/internal/version.Date=${DATE}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            dir="dist/spark-tools-${VERSION}-${GOOS}-${GOARCH}"
            mkdir -p "${dir}"

            for bin in hfetch llm-run llm-bench; do
              echo "Building ${bin} for ${GOOS}/${GOARCH}"
              CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
                go build -ldflags "${LDFLAGS}" -o "${dir}/${bin}" "./cmd/${bin}"
            done

            cp LICENSE "${dir}/"
            tar -czf "${dir}.tar.gz" -C dist "spark-tools-${VERSION}-${GOOS}-${GOARCH}"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: "!contains(github.ref_name, '-')"
        run: |
          VERSION=${GITHUB_REF_NAME}
          DARWIN_ARM64_SHA=$(grep "darwin-arm64" dist/checksums.txt | awk '{print $1}')
          DARWIN_AMD64_SHA=$(grep "darwin-amd64" dist/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "linux-arm64" dist/checksums.txt | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep "linux-amd64" dist/checksums.txt | awk '{print $1}')
          BASE_URL="https://github.com/lazypower/spark-tools/releases/download/${VERSION}"

          cat > formula.rb <<FORMULA
          class SparkTools < Formula
            desc "Pure Go toolchain for local LLM workflows on DGX Spark hardware"
            homepage "https://github.com/lazypower/spark-tools"
            license "MIT"
            version "${VERSION#v}"

            on_macos do
              on_arm do
                url "${BASE_URL}/spark-tools-${VERSION}-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
              on_intel do
                url "${BASE_URL}/spark-tools-${VERSION}-darwin-amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/spark-tools-${VERSION}-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "${BASE_URL}/spark-tools-${VERSION}-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "hfetch"
              bin.install "llm-run"
              bin.install "llm-bench"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hfetch --version")
            end
          end
          FORMULA

          # Push formula to homebrew tap repo
          git clone "https://x-access-token:${BREW_TAP_TOKEN}@github.com/lazypower/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/spark-tools.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spark-tools.rb
          git commit -m "spark-tools ${VERSION}"
          git push
        env:
          BREW_TAP_TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
